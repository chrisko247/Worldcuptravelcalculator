<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>World Cup 2026 Travel Cost Calculator</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0b1e3c;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
color:black;
padding:25px;
border-radius:10px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#27ae60;
border:none;
color:white;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

.result{
font-size:28px;
text-align:center;
margin-top:20px;
font-weight:bold;
}

</style>

</head>


<body>

<h1 style="text-align:center;">World Cup 2026 Trip Cost Calculator</h1>

<div class="container">

<label>Your Country</label>
<select id="country"></select>

<label>Host City</label>
<select id="city">

<option>New York</option>
<option>Los Angeles</option>
<option>Dallas</option>
<option>Houston</option>
<option>Miami</option>
<option>Atlanta</option>
<option>Boston</option>
<option>Philadelphia</option>
<option>Seattle</option>
<option>San Francisco</option>
<option>Kansas City</option>
<option>Toronto</option>
<option>Vancouver</option>
<option>Mexico City</option>
<option>Guadalajara</option>
<option>Monterrey</option>

</select>

<label>Flight Cost ($)</label>
<input id="flight">

<label>Hotel Per Night ($)</label>
<input id="hotel">

<label>Number of Nights</label>
<input id="nights">

<label>Match Tickets ($)</label>
<input id="tickets">

<button onclick="calculate()">Calculate Total Cost</button>

<div class="result" id="result">$0</div>

</div>


<script>

const countries = [
"Afghanistan","Albania","Algeria","Argentina","Australia","Austria","Bangladesh","Belgium","Brazil","Canada",
"Chile","China","Colombia","Denmark","Egypt","Finland","France","Germany","Ghana","Greece","India","Indonesia",
"Iran","Iraq","Ireland","Israel","Italy","Japan","Kenya","Malaysia","Mexico","Morocco","Netherlands","New Zealand",
"Nigeria","Norway","Pakistan","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Saudi Arabia",
"Singapore","South Africa","South Korea","Spain","Sweden","Switzerland","Thailand","Turkey","Ukraine",
"United Arab Emirates","United Kingdom","United States","Vietnam","Zimbabwe"
];

const dropdown = document.getElementById("country");

countries.forEach(function(country){

let option = document.createElement("option");

option.value = country;

option.text = country;

dropdown.appendChild(option);

});

function calculate(){

let flight = Number(document.getElementById("flight").value) || 0;
let hotel = Number(document.getElementById("hotel").value) || 0;
let nights = Number(document.getElementById("nights").value) || 0;
let tickets = Number(document.getElementById("tickets").value) || 0;

let total = flight + (hotel * nights) + tickets;

document.getElementById("result").innerHTML = "$" + total;

}

</script>


</body>
</html>
