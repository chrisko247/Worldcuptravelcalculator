<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup Budget Calculator</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#0b1b34;
margin:0;
color:#222;
}

header{
text-align:center;
padding:60px 20px;
color:white;
}

header h1{
font-size:40px;
margin-bottom:10px;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.calculator{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.calculator h2{
margin-top:0;
}

input,select{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
background:#22c55e;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.result{
margin-top:20px;
font-size:24px;
font-weight:bold;
text-align:center;
}

</style>
</head>


<body>

<header>
<h1>World Cup Budget Calculator</h1>
<p>Estimate the real cost of attending the FIFA World Cup</p>
</header>


<div class="container">

<div class="calculator">

<h2>Estimate Your Trip Cost</h2>

<label>Select Host City</label>

<select id="city" onchange="setCityCost()">

<option value="">Choose a city</option>

<option value="newyork">New York</option>
<option value="losangeles">Los Angeles</option>
<option value="dallas">Dallas</option>
<option value="houston">Houston</option>
<option value="miami">Miami</option>
<option value="atlanta">Atlanta</option>
<option value="boston">Boston</option>
<option value="philadelphia">Philadelphia</option>
<option value="seattle">Seattle</option>
<option value="sanfrancisco">San Francisco</option>
<option value="kansascity">Kansas City</option>

<option value="toronto">Toronto</option>
<option value="vancouver">Vancouver</option>

<option value="mexicocity">Mexico City</option>
<option value="guadalajara">Guadalajara</option>
<option value="monterrey">Monterrey</option>

</select>


<input id="flight" type="number" placeholder="Flights ($)">
<input id="hotel" type="number" placeholder="Hotel per night ($)">
<input id="nights" type="number" placeholder="Number of nights">
<input id="ticket" type="number" placeholder="Match tickets ($)">
<input id="food" type="number" placeholder="Food per day ($)">
<input id="days" type="number" placeholder="Days">

<button onclick="calculate()">Calculate Budget</button>

<div class="result" id="total">$0</div>

</div>

</div>


<script>

function calculate(){

let flight = Number(document.getElementById("flight").value);
let hotel = Number(document.getElementById("hotel").value);
let nights = Number(document.getElementById("nights").value);
let ticket = Number(document.getElementById("ticket").value);
let food = Number(document.getElementById("food").value);
let days = Number(document.getElementById("days").value);

let total = flight + (hotel * nights) + ticket + (food * days);

document.getElementById("total").innerHTML = "$" + total;

}



function setCityCost(){

const prices = {

newyork:{flight:900,hotel:350,ticket:250,food:120},
losangeles:{flight:850,hotel:300,ticket:240,food:110},
dallas:{flight:800,hotel:220,ticket:210,food:90},
houston:{flight:780,hotel:200,ticket:210,food:85},
miami:{flight:820,hotel:300,ticket:240,food:110},
atlanta:{flight:750,hotel:250,ticket:220,food:90},
boston:{flight:880,hotel:260,ticket:230,food:100},
philadelphia:{flight:860,hotel:250,ticket:220,food:95},
seattle:{flight:900,hotel:270,ticket:240,food:110},
sanfrancisco:{flight:950,hotel:320,ticket:260,food:120},
kansascity:{flight:720,hotel:180,ticket:200,food:80},

toronto:{flight:700,hotel:280,ticket:230,food:100},
vancouver:{flight:750,hotel:260,ticket:220,food:95},

mexicocity:{flight:500,hotel:120,ticket:180,food:60},
guadalajara:{flight:520,hotel:110,ticket:170,food:55},
monterrey:{flight:540,hotel:120,ticket:180,food:60}

};

let city = document.getElementById("city").value;

if(prices[city]){

document.getElementById("flight").value = prices[city].flight;
document.getElementById("hotel").value = prices[city].hotel;
document.getElementById("ticket").value = prices[city].ticket;
document.getElementById("food").value = prices[city].food;

}

}

</script>


</body>
</html>
